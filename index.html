<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- non-blocking font load -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" />
  </noscript>

  <link rel="icon" type="image/png" href="/dayone.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="America, stolen lands built by stolen hands." />
  <title>Day One Movement</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        if (stored !== 'light') document.documentElement.classList.add('dark');
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')
        if (redirect) {
          const decoded = decodeURIComponent(redirect)
          window.history.replaceState({}, '', decoded)
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
